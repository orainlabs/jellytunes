name: Windows Smoke Test

# Smoke test for Windows to catch platform-specific bugs:
# - Path traversal (issue #1)
# - FFmpeg ENOENT in app.asar (issue #2)
# - /tmp hardcoded path failure (issue #3)
#
# Runs on every push to main and on PRs targeting main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Python setuptools (required by node-gyp for native modules)
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run sync unit tests (covers ffmpeg-path, temp-path, sync-config)
        run: |
          pnpm vitest run src/sync/ffmpeg-path.test.ts src/sync/temp-path.test.ts src/sync/sync-config.test.ts

      - name: Build and package for Windows
        run: |
          pnpm build
          pnpm exec electron-builder --win --x64 --publish never

      - name: Verify app.asar.unpacked contains FFmpeg binary
        shell: pwsh
        run: |
          $unpacked = Get-ChildItem -Recurse -Path "release/win-unpacked/resources" -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue
          if (-not $unpacked) {
            Write-Error "FFmpeg binary not found in app.asar.unpacked"
            exit 1
          }
          Write-Output "FFmpeg found at: $($unpacked.FullName)"
          Write-Output "Size: $($unpacked.Length) bytes"

      - name: Run smoke test (FFmpeg resolution + temp paths + FFmpeg executability)
        shell: pwsh
        run: |
          # Write a Node.js smoke test script that verifies FFmpeg without requiring bundled modules
          $script = @'
          const { execSync } = require('child_process');
          const path = require('path');
          const os = require('os');

          // 1. Locate FFmpeg from unpacked resources (not from node_modules inside app.asar)
          // electron-builder extracts app.asar.unpacked to release/<platform>-unpacked/resources
          const unpackedDir = path.join(__dirname, 'release', 'win-unpacked', 'resources', 'app.asar.unpacked');
          let ffmpegPath = null;

          // Search for ffmpeg.exe in unpacked directory using Node.js fs module
          // (avoids shell injection risk from PowerShell interpolation)
          function findFfmpeg(dir) {
            const fs = require('fs');
            const { readdirSync, statSync } = fs;

            function search(currentDir) {
              try {
                const entries = readdirSync(currentDir, { withFileTypes: true });
                for (const entry of entries) {
                  const fullPath = path.join(currentDir, entry.name);
                  if (entry.name === 'ffmpeg.exe') {
                    return fullPath;
                  }
                  if (entry.isDirectory()) {
                    const found = search(fullPath);
                    if (found) return found;
                  }
                }
              } catch {
                // Ignore permission denied or other errors
              }
              return null;
            }

            return search(dir);
          }

          ffmpegPath = findFfmpeg(unpackedDir);
          if (!ffmpegPath) {
            console.error('FAIL: FFmpeg binary not found in unpacked resources');
            process.exit(1);
          }

          console.log('FFmpeg path found:', ffmpegPath);

          // 2. Verify FFmpeg path is NOT inside app.asar/node_modules (would cause ENOENT)
          // Unpacked resources should have FFmpeg at: app.asar.unpacked/node_modules/@ffmpeg-installer/...
          // NOT at: app.asar/node_modules/@ffmpeg-installer/...
          if (ffmpegPath.includes('app.asar' + path.sep + 'node_modules')) {
            console.error('FAIL: FFmpeg path inside app.asar — will cause ENOENT on Windows');
            process.exit(1);
          }
          console.log('FFmpeg location verified: outside app.asar');

          // 3. Verify temp paths use os.tmpdir(), not hardcoded /tmp
          // Use path module to construct test temp path (same pattern as buildTempPaths)
          const tmp = os.tmpdir();
          const timestamp = Date.now();
          const safeName = 'test-track'.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 50);
          const sourcePath = path.join(tmp, 'jellytunes_src_' + timestamp + '.tmp');
          const tempPath = path.join(tmp, 'jellytunes_' + timestamp + '_' + safeName + '.mp3');

          console.log('os.tmpdir():', tmp);
          console.log('sourcePath:', sourcePath);
          console.log('tempPath:', tempPath);

          // Use case-insensitive comparison to handle Windows case variations
          // (e.g., C:\Users\user vs c:\users\user)
          const normalizedTmp = tmp.toLowerCase();
          if (!sourcePath.toLowerCase().startsWith(normalizedTmp)) {
            console.error('FAIL: sourcePath does not start with os.tmpdir()');
            process.exit(1);
          }
          if (!tempPath.toLowerCase().startsWith(normalizedTmp)) {
            console.error('FAIL: tempPath does not start with os.tmpdir()');
            process.exit(1);
          }
          // Check for hardcoded /tmp (case-insensitive for cross-platform consistency)
          const lowerSource = sourcePath.toLowerCase();
          const lowerTemp = tempPath.toLowerCase();
          if (lowerSource.includes('/tmp') || lowerSource.includes('\\tmp') ||
              lowerTemp.includes('/tmp') || lowerTemp.includes('\\tmp')) {
            console.error('FAIL: path contains hardcoded /tmp — will fail on Windows');
            process.exit(1);
          }
          console.log('Temp path verification passed');

          // 4. Verify FFmpeg binary is actually executable on Windows
          try {
            // Use array form to avoid quoting edge cases with trailing backslash
            const version = execSync([ffmpegPath, '-version'], { encoding: 'utf8', timeout: 10000 });
            if (!version.includes('ffmpeg')) {
              console.error('FAIL: FFmpeg -version output unexpected:', version.slice(0, 200));
              process.exit(1);
            }
            console.log('FFmpeg version check passed');
          } catch (e) {
            console.error('FAIL: Cannot execute FFmpeg at', ffmpegPath, ':', e.message);
            process.exit(1);
          }

          console.log('All smoke tests PASSED');
          '@

          $script | Out-File -FilePath "smoke-test.js" -Encoding UTF8
          node smoke-test.js
