name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.17)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10

      - uses: actions/setup-node@0355742c943ddb13ca8a6b700f824231caa91e75
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Python
        if: matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Build and package
        run: pnpm run build && pnpm exec electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@3efcac8951299998593f871640ea8059d6818655
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
