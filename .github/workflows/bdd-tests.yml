name: BDD Tests

on: workflow_dispatch # manual only — BDD tests require a real Electron environment, run locally

permissions:
  contents: read

jobs:
  bdd-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@0355742c943ddb13ca8a6b700f824231caa91e75
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Python setuptools (Windows)
        if: matrix.os == 'windows-latest'
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xvfb libudev-dev

      # Windows does not need xvfb — Electron runs natively
      - name: Run BDD tests
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum pnpm test:bdd:ci

      - name: Run BDD tests (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm test:bdd:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bdd-test-results-${{ matrix.os }}
          path: |
            tests/bdd/reports/
            tests/bdd/screenshots/
          retention-days: 30
